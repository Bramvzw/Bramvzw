name: generate contribution snake

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: Bramvzw
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23f97316
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23f97316
      - name: deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
